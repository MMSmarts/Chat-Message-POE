name: Java CI with Maven

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Maven and run tests
        run: |
          mvn -Pcustom-src -B test
        # The project contains a custom source layout; the `custom-src` profile
        # in pom.xml maps the source and test directories to the existing
        # NetBeans layout (src/mainApp and Test/testApp).
