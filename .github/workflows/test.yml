name: Java CI with Maven

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Compile Java files
      run: |
        mkdir -p target/classes
        javac -d target/classes mainApp/*.java
        javac -cp "target/classes:lib/junit-jupiter-api-5.9.2.jar:lib/junit-jupiter-engine-5.9.2.jar:lib/junit-platform-console-standalone-1.9.2.jar" -d target/test-classes testApp/*.java
    
    - name: Download JUnit
      run: |
        mkdir -p lib
        cd lib
        wget -q https://repo1.maven.org/maven2/org/junit/platform/junit-platform-console-standalone/1.9.2/junit-platform-console-standalone-1.9.2.jar
    
    - name: Run Unit Tests
      run: |
        java -jar lib/junit-platform-console-standalone-1.9.2.jar \
          --class-path target/classes:target/test-classes \
          --scan-class-path \
          --include-classname testApp.*